version: 1
applications:
  - appRoot: manantial-frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build -- --configuration production
      artifacts:
        baseDirectory: dist/manantial-ecommerce-frontend/browser
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
